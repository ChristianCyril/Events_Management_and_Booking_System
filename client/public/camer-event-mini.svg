<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff7f2a"></stop>
      <stop offset="50%" stop-color="#e55e00"></stop>
      <stop offset="100%" stop-color="#a34300"></stop>
    </linearGradient>
  </defs>

  <!-- Bigger Pin (fills more space) -->
  <path d="M100 10 
           A55 55 0 0 0 45 70 
           C45 130 100 190 100 190 
           C100 190 155 130 155 70 
           A55 55 0 0 0 100 10 Z" fill="url(#pinGrad)"></path>

  <!-- Inner circle -->
  <circle cx="100" cy="75" r="28" fill="#ffffff"></circle>

  <!-- Flag stripes -->
  <rect x="72" y="47" width="18" height="56" fill="#007A5E"></rect>
  <rect x="90" y="47" width="18" height="56" fill="#CE1126"></rect>
  <rect x="108" y="47" width="20" height="56" fill="#FCD116"></rect>

  <!-- Star -->
  <path d="M100 60 
           L105 70 L116 72 
           L108 80 L110 92 
           L100 86 
           L90 92 L92 80 
           L84 72 L95 70 Z" fill="#FCD116"></path>

  <!-- Outline -->
